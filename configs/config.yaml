# Centralized experiment config
system:
  latent_dim: 512
  seed: 42
  device: "cuda"

audio_vae:
  batch_size: 16
  num_epochs: 100
  learning_rate: 1.0e-3
  beta: 0.005
  input_channels: 22
  time_steps: 216

image_vae:
  batch_size: 8
  num_epochs: 40
  learning_rate: 1.0e-4
  beta: 0.005

mapping_network:
  batch_size: 16
  num_epochs: 50
  learning_rate: 1.0e-4
  beta: 0.005
  cycle_weight: 1.0
  div_weight: 0.001
  mmd_weight: 5.0

latent_diffusion:
  batch_size: 4  # Reduced batch size for 16x16 on GTX 1650
  num_epochs: 50
  learning_rate: 1.0e-4
  time_emb_dim: 128
  num_train_timesteps: 1000
  latent_channels: 8
  spatial_size: 16

paths:
  audio_features: "datasets/audio_features"
  image_features: "datasets/abstract_art"
  models_dir: "tmodels"
  outputs_dir: "datasets/reconstructed_images"
